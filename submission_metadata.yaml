# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Five-stage hybrid ranking pipeline. Stage 1: exact 47-title taxonomy filter
  cuts 100K to ~31K plausible candidates (Tier A: genuine ML/AI titles;
  Tier B: adjacent SWE/Data/DevOps; decoys excluded). Stage 2: JD disqualifier
  rules (consulting-only career, title-chaser pattern, skill claim vs assessed
  score gap) applied to the filtered pool. Stage 3: precomputed BGE
  (bge-small-en-v1.5) cosine similarity between candidate narrative text and JD
  query provides semantic fit signal. Stage 4: weighted composite score fusing
  title tier (0.25), BGE semantic score (0.40), JD skill signal count (0.15),
  location fit (0.10), notice period (0.05), and experience fit (0.05),
  multiplied by a dampened behavioral modifier (response rate, interview
  completion, last-active recency). Stage 5: grounded per-candidate reasoning
  sourced only from career descriptions (no hallucination). The pipeline runs
  in ~45s on CPU; precomputed embeddings are baked into the Docker image.

